enable
configure terminal

! Configure subinterfaces for VLANs on interface connected to Switch
interface gig0/0.10
 encapsulation dot1Q 10 
 ip address 192.168.1.1 255.255.255.0
 ip nat inside 
 no shutdown

interface gig0/0.20
 encapsulation dot1Q 20  
 ip address 192.168.2.1 255.255.255.0
 ip nat inside     
 no shutdown

! Configure physical interface to Switch
interface gig0/0
 no shutdown

! Configure outside interface (simulated Internet)
interface gig0/1
 ip address 1.1.1.1 255.255.255.0
 ip nat outside  
 no shutdown

! DHCP Configuration (only for Guests - VLAN 20)
! Exclude router's own IP from DHCP pool
ip dhcp excluded-address 192.168.2.1

! Create DHCP pool for guests
ip dhcp pool GUESTS
 network 192.168.2.0 255.255.255.0
 default-router 192.168.2.1
 dns-server 8.8.8.8
 exit

! ACL for VLAN isolation (prevents communication between cash and guests)
access-list 101 deny ip 192.168.1.0 0.0.0.255 192.168.2.0 0.0.0.255
access-list 101 deny ip 192.168.2.0 0.0.0.255 192.168.1.0 0.0.0.255
access-list 101 permit ip any any 

! Apply ACL to VLAN 10 (cash) subinterface - incoming traffic
interface gig0/0.10
 ip access-group 101 in

! ACL for NAT - which internal networks to translate
access-list 1 permit 192.168.1.0 0.0.0.255
access-list 1 permit 192.168.2.0 0.0.0.255

! NAT Configuration
ip nat inside source list 1 interface gig0/1 overload 

