enable
configure terminal

! Create VLANs
vlan 10
 name cash 
vlan 20
 name clients  

! Configure interface to Router (Trunk)
interface gig0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk   
 no shutdown

! Configure access port for Cashier PC (VLAN 10)
interface fastEthernet 0/1
 switchport mode access
 switchport access vlan 10
 no shutdown

! Configure access port for WRT300N Access Point (VLAN 20)
interface gig0/1     
 switchport mode access
 switchport access vlan 20
 no shutdown
